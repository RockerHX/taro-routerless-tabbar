name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:run

      - name: Build package
        run: pnpm run build

      - name: Pack dry run
        run: pnpm run pack:dry-run

      - name: Audit
        run: pnpm audit --audit-level moderate

      - name: Taro smoke builds
        run: pnpm run test:taro

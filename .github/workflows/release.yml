name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing tag to create a GitHub Release for'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:run

      - name: Build package
        run: pnpm run build

      - name: Pack dry run
        run: pnpm run pack:dry-run

      - name: Package consumer validation
        run: pnpm run test:package-consumer

      - name: Audit
        run: pnpm audit --audit-level moderate

      - name: Taro smoke builds
        run: pnpm run test:taro

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes --verify-tag
